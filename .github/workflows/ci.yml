name: CI/CD GameGo

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  release:
    types: [ created ]

jobs:
  
  build:
    name: Build & Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Instalar Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Instalar dependências do Ebiten (Linux)
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev libgl1-mesa-dev libxcursor-dev libxi-dev libxinerama-dev libxrandr-dev libxxf86vm-dev

      - name: Baixar módulos
        run: go mod tidy

      - name: Build
        run: go build ./...

  
  release:
    name: Build Release (Windows .exe)
    runs-on: ubuntu-latest
    if: github.event_name == 'release'

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Instalar Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Instalar dependências do Ebiten (Linux)
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev libgl1-mesa-dev libxcursor-dev libxi-dev libxinerama-dev libxrandr-dev libxxf86vm-dev

      - name: Baixar módulos
        run: go mod tidy

      - name: Build Windows .exe
        run: GOOS=windows GOARCH=amd64 go build -o gamego.exe .

      - name: Upload .exe na Release
        uses: softprops/action-gh-release@v2
        with:
          files: gamego.exe